<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anthony's Card Maker</title>
  <style>
    :root {
      --ink: #1b1a17;
      --paper: #f6efe1;
      --gold: #d7a84d;
      --blue: #345e9e;
      --red: #a9453f;
      --green: #4f7b54;
      --shadow: rgba(0, 0, 0, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: #e8e2d5;
    }

    main {
      display: grid;
      grid-template-columns: minmax(280px, 420px) minmax(320px, 1fr);
      gap: 24px;
      min-height: 100vh;
      padding: 24px;
    }

    h1, h2, p { margin-top: 0; }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .panel {
      background: #fffaf0;
      border: 2px solid #c7b895;
      border-radius: 8px;
      padding: 18px;
      box-shadow: 0 12px 28px var(--shadow);
    }

    .controls {
      display: grid;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 5px;
      font-size: 13px;
      font-weight: 700;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid #b8aa8a;
      border-radius: 6px;
      padding: 9px 10px;
      font: inherit;
      background: #fffef9;
    }

    textarea {
      min-height: 56px;
      resize: vertical;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 4px;
    }

    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 12px;
      font-weight: 800;
      cursor: pointer;
      color: white;
      background: var(--blue);
    }

    button.secondary {
      color: var(--ink);
      background: #ead9b5;
    }

    .workspace {
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .card-stage {
      display: flex;
      justify-content: center;
      padding: 12px;
    }

    .card {
      width: 300px;
      height: 420px;
      border: 8px solid #2a2926;
      border-radius: 14px;
      padding: 10px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.2), transparent 24%),
        linear-gradient(180deg, #e0c67d, #f5e8bd 40%, #dac07b);
      box-shadow: 0 14px 26px var(--shadow);
      position: relative;
      overflow: hidden;
      break-inside: avoid;
    }

    .card[data-theme="space"] {
      background:
        radial-gradient(circle at 20% 12%, rgba(255,255,255,0.55), transparent 9%),
        linear-gradient(160deg, #1d2d4d, #5477aa 43%, #d4ad5b 44%, #efe1b0);
    }

    .card[data-theme="metal"] {
      background:
        linear-gradient(135deg, rgba(255,255,255,0.55), transparent 22%),
        linear-gradient(180deg, #b7bdc2, #f0ead9 40%, #989fa5);
    }

    .card-header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      min-height: 36px;
      background: rgba(255, 250, 235, 0.94);
      border: 2px solid #2a2926;
      border-radius: 8px 8px 4px 4px;
      padding: 5px 7px;
    }

    .card-name {
      font-size: 20px;
      line-height: 1;
      font-weight: 900;
      text-transform: uppercase;
    }

    .cost {
      display: grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      color: white;
      background: #222;
      font-size: 17px;
      font-weight: 900;
    }

    .type-line {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin: 6px 0;
      padding: 4px 7px;
      border: 2px solid #2a2926;
      border-radius: 4px;
      background: rgba(255, 250, 235, 0.9);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .art {
      height: 156px;
      border: 3px solid #2a2926;
      border-radius: 5px;
      background: #f8f4e8;
      overflow: hidden;
      display: grid;
      place-items: center;
      position: relative;
    }

    .art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .placeholder-art {
      width: 100%;
      height: 100%;
      background:
        linear-gradient(transparent 0 48%, rgba(0,0,0,0.11) 49% 51%, transparent 52%),
        linear-gradient(90deg, transparent 0 48%, rgba(0,0,0,0.11) 49% 51%, transparent 52%),
        linear-gradient(135deg, #f8f4e8, #d8e5f5);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 18px;
      font-weight: 900;
      color: #4b4b4b;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
      margin: 7px 0;
    }

    .stat {
      display: grid;
      place-items: center;
      min-height: 34px;
      border: 2px solid #2a2926;
      border-radius: 6px;
      color: white;
      background: var(--red);
      font-weight: 900;
      font-size: 15px;
    }

    .stat span {
      display: block;
      font-size: 8px;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .stat.def { background: var(--green); }
    .stat.spd { background: var(--blue); }
    .stat.eng { background: #7a568f; }

    .ability {
      border: 2px solid #2a2926;
      border-radius: 5px;
      background: rgba(255, 250, 235, 0.95);
      padding: 6px 7px;
      margin-bottom: 6px;
      min-height: 44px;
    }

    .ability strong {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
    }

    .ability div {
      font-size: 12px;
      line-height: 1.22;
    }

    .flavor {
      position: absolute;
      left: 13px;
      right: 13px;
      bottom: 29px;
      min-height: 24px;
      padding: 4px 7px;
      border: 1px solid #2a2926;
      border-radius: 5px;
      background: rgba(255, 250, 235, 0.82);
      font-size: 11px;
      font-style: italic;
    }

    .footer {
      position: absolute;
      left: 13px;
      right: 13px;
      bottom: 8px;
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .sheet {
      display: grid;
      grid-template-columns: repeat(3, 300px);
      gap: 12px;
      justify-content: center;
    }

    .sheet .card {
      transform: scale(0.72);
      transform-origin: top center;
      margin-bottom: -118px;
    }

    .hint {
      color: #665b45;
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 860px) {
      main {
        grid-template-columns: 1fr;
        padding: 14px;
      }
    }

    @media print {
      body { background: white; }
      main { display: block; padding: 0; }
      .controls, .intro, .preview-title { display: none !important; }
      .panel { border: 0; box-shadow: none; padding: 0; background: white; }
      .card-stage { display: none; }
      .sheet {
        width: 7.5in;
        grid-template-columns: repeat(3, 2.4in);
        gap: 0.1in;
        justify-content: start;
      }
      .sheet .card {
        width: 2.4in;
        height: 3.36in;
        transform: none;
        margin: 0;
        box-shadow: none;
        border-width: 0.06in;
        page-break-inside: avoid;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="panel controls">
      <div class="intro">
        <h1>Anthony's Card Maker</h1>
        <p class="hint">Fill in the boxes, add a drawing, then add the card to the print sheet. Print makes a 9-card page.</p>
      </div>

      <label>Card name
        <input id="name" value="GOLDENGLIDE">
      </label>

      <div class="row">
        <label>Role
          <input id="role" value="Leader">
        </label>
        <label>Type
          <input id="type" value="Jet / Robot">
        </label>
      </div>

      <div class="row">
        <label>Theme
          <select id="theme">
            <option value="space">Space gold</option>
            <option value="metal">Metal</option>
            <option value="classic">Classic gold</option>
          </select>
        </label>
        <label>Cost
          <input id="cost" value="4">
        </label>
      </div>

      <div class="row">
        <label>Attack
          <input id="attack" value="20">
        </label>
        <label>Defense
          <input id="defense" value="20">
        </label>
      </div>

      <div class="row">
        <label>Speed
          <input id="speed" value="8">
        </label>
        <label>Energy
          <input id="energy" value="6">
        </label>
      </div>

      <label>Artwork
        <input id="artUpload" type="file" accept="image/*">
      </label>

      <label>Ability 1 name
        <input id="abilityOneName" value="Photon Beam">
      </label>
      <label>Ability 1 text
        <textarea id="abilityOneText">Deal 20 dmg.</textarea>
      </label>

      <label>Ability 2 name
        <input id="abilityTwoName" value="Spare Parts">
      </label>
      <label>Ability 2 text
        <textarea id="abilityTwoText">Heal 20.</textarea>
      </label>

      <label>Special / alt-mode
        <textarea id="special">Alt-mode: switch between jet and robot form.</textarea>
      </label>

      <label>Flavor line
        <input id="flavor" value="Wanna bet?">
      </label>

      <div class="actions">
        <button id="addCard" type="button">Add to Sheet</button>
        <button id="printSheet" type="button" class="secondary">Print Cards</button>
        <button id="clearSheet" type="button" class="secondary">Clear Sheet</button>
      </div>
    </section>

    <section class="workspace">
      <section class="panel">
        <h2 class="preview-title">Live Card</h2>
        <div class="card-stage" id="preview"></div>
      </section>

      <section class="panel">
        <h2 class="preview-title">Print Sheet</h2>
        <p class="hint preview-title">Add up to 9 cards, then print. Use the browser print dialog and choose Letter paper.</p>
        <div class="sheet" id="sheet"></div>
      </section>
    </section>
  </main>

  <template id="cardTemplate">
    <article class="card" data-theme="space">
      <div class="card-header">
        <div class="card-name" data-card-name></div>
        <div class="cost" data-cost></div>
      </div>
      <div class="type-line">
        <span data-role></span>
        <span data-type></span>
      </div>
      <div class="art" data-art></div>
      <div class="stats">
        <div class="stat atk"><span>ATK</span><b data-attack></b></div>
        <div class="stat def"><span>DEF</span><b data-defense></b></div>
        <div class="stat spd"><span>SPD</span><b data-speed></b></div>
        <div class="stat eng"><span>ENG</span><b data-energy></b></div>
      </div>
      <section class="ability">
        <strong data-ability-one-name></strong>
        <div data-ability-one-text></div>
      </section>
      <section class="ability">
        <strong data-ability-two-name></strong>
        <div data-ability-two-text></div>
      </section>
      <section class="ability">
        <strong>Special</strong>
        <div data-special></div>
      </section>
      <div class="flavor" data-flavor></div>
      <div class="footer">
        <span>Anthony Games</span>
        <span>Card 001</span>
      </div>
    </article>
  </template>

  <script>
    const ids = [
      "name", "role", "type", "theme", "cost", "attack", "defense", "speed",
      "energy", "abilityOneName", "abilityOneText", "abilityTwoName",
      "abilityTwoText", "special", "flavor"
    ];

    const state = Object.fromEntries(ids.map((id) => [id, document.getElementById(id).value]));
    const preview = document.getElementById("preview");
    const sheet = document.getElementById("sheet");
    const template = document.getElementById("cardTemplate");
    let artDataUrl = "";

    function setText(card, selector, value) {
      card.querySelector(selector).textContent = value || "";
    }

    function buildCard() {
      const card = template.content.firstElementChild.cloneNode(true);
      card.dataset.theme = state.theme === "classic" ? "" : state.theme;
      setText(card, "[data-card-name]", state.name);
      setText(card, "[data-cost]", state.cost);
      setText(card, "[data-role]", state.role);
      setText(card, "[data-type]", state.type);
      setText(card, "[data-attack]", state.attack);
      setText(card, "[data-defense]", state.defense);
      setText(card, "[data-speed]", state.speed);
      setText(card, "[data-energy]", state.energy);
      setText(card, "[data-ability-one-name]", state.abilityOneName);
      setText(card, "[data-ability-one-text]", state.abilityOneText);
      setText(card, "[data-ability-two-name]", state.abilityTwoName);
      setText(card, "[data-ability-two-text]", state.abilityTwoText);
      setText(card, "[data-special]", state.special);
      setText(card, "[data-flavor]", state.flavor);

      const art = card.querySelector("[data-art]");
      if (artDataUrl) {
        const img = document.createElement("img");
        img.src = artDataUrl;
        img.alt = "Card artwork";
        art.appendChild(img);
      } else {
        const placeholder = document.createElement("div");
        placeholder.className = "placeholder-art";
        placeholder.textContent = "Drop in Anthony's drawing";
        art.appendChild(placeholder);
      }
      return card;
    }

    function renderPreview() {
      preview.innerHTML = "";
      preview.appendChild(buildCard());
    }

    for (const id of ids) {
      document.getElementById(id).addEventListener("input", (event) => {
        state[id] = event.target.value;
        renderPreview();
      });
    }

    document.getElementById("artUpload").addEventListener("change", (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        artDataUrl = String(reader.result || "");
        renderPreview();
      };
      reader.readAsDataURL(file);
    });

    document.getElementById("addCard").addEventListener("click", () => {
      if (sheet.children.length >= 9) sheet.removeChild(sheet.firstElementChild);
      sheet.appendChild(buildCard());
    });

    document.getElementById("printSheet").addEventListener("click", () => {
      if (!sheet.children.length) sheet.appendChild(buildCard());
      window.print();
    });

    document.getElementById("clearSheet").addEventListener("click", () => {
      sheet.innerHTML = "";
    });

    renderPreview();
    sheet.appendChild(buildCard());
  </script>
</body>
</html>
